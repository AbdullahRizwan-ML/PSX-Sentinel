# PSX Sentinel — Alembic Configuration
# The actual database URL is overridden in alembic/env.py from settings.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# The sqlalchemy.url is a placeholder — env.py overrides this with the
# real connection string from the Settings singleton at runtime.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
